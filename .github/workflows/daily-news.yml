name: Daily AI News Aggregator

on:
  schedule:
    # Run daily at 9:00 AM GMT+1 (8:00 AM UTC)
    # Cron format: minute hour day month day-of-week (all in UTC)
    - cron: '0 7 * * *'
  
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  fetch-and-send-news:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        # Fetch full history to allow committing back changes
        fetch-depth: 0
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Create necessary directories
      run: |
        mkdir -p data logs output
    
    - name: Run AI News Agent
      env:
        # Email configuration (if using SMTP)
        EMAIL_ENABLED: ${{ secrets.EMAIL_ENABLED }}
        EMAIL_METHOD: ${{ secrets.EMAIL_METHOD }}
        EMAIL_SMTP_SERVER: ${{ secrets.EMAIL_SMTP_SERVER }}
        EMAIL_SMTP_PORT: ${{ secrets.EMAIL_SMTP_PORT }}
        EMAIL_USER: ${{ secrets.EMAIL_USER }}
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
        EMAIL_TO: ${{ secrets.EMAIL_TO }}
        
        # Slack configuration
        SLACK_ENABLED: ${{ secrets.SLACK_ENABLED }}
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        
        # SendGrid API (if using)
        SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
        
        # Mailgun API (if using)
        MAILGUN_API_KEY: ${{ secrets.MAILGUN_API_KEY }}
        MAILGUN_DOMAIN: ${{ secrets.MAILGUN_DOMAIN }}
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      run: |
        python ai_news_agent.py
    
    - name: Commit and push updates
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # Add changes to seen_items.json (to track duplicates across runs)
        git add data/seen_items.json || true
        git add logs/*.log || true
        git add output/*.html output/*.txt || true
        
        # Commit if there are changes
        git diff --quiet && git diff --staged --quiet || \
          git commit -m "Auto-update: Daily AI news digest $(date +'%Y-%m-%d')"
        
        # Push changes back to repository
        git push || true
      continue-on-error: true
    
    - name: Upload digest artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: daily-digest-${{ github.run_number }}
        path: |
          output/*.html
          output/*.txt
          logs/*.log
        retention-days: 30

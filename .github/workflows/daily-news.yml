name: Daily AI News Aggregator

on:
  schedule:
    # Run daily at 9:00 AM GMT+1 (8:00 AM UTC)
    # Cron format: minute hour day month day-of-week (all in UTC)
    - cron: '0 7 * * *'
  
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

permissions:
  contents: write  # Required to commit and push changes back

jobs:
  fetch-and-send-news:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        # Fetch full history to allow committing back changes
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
        persist-credentials: true
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Create necessary directories
      run: |
        mkdir -p data logs output
    
    - name: Check existing seen_items.json
      run: |
        if [ -f data/seen_items.json ]; then
          echo "✓ seen_items.json exists from previous run"
          echo "Number of seen items: $(jq '.seen_ids | length' data/seen_items.json)"
        else
          echo "⚠️  No previous seen_items.json found (first run or not committed)"
        fi
    
    - name: Run AI News Agent
      env:
        # Email configuration (if using SMTP)
        EMAIL_ENABLED: ${{ secrets.EMAIL_ENABLED }}
        EMAIL_METHOD: ${{ secrets.EMAIL_METHOD }}
        EMAIL_SMTP_SERVER: ${{ secrets.EMAIL_SMTP_SERVER }}
        EMAIL_SMTP_PORT: ${{ secrets.EMAIL_SMTP_PORT }}
        EMAIL_USER: ${{ secrets.EMAIL_USER }}
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
        EMAIL_TO: ${{ secrets.EMAIL_TO }}
        
        # Slack configuration
        SLACK_ENABLED: ${{ secrets.SLACK_ENABLED }}
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        
        # SendGrid API (if using)
        SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
        
        # Mailgun API (if using)
        MAILGUN_API_KEY: ${{ secrets.MAILGUN_API_KEY }}
        MAILGUN_DOMAIN: ${{ secrets.MAILGUN_DOMAIN }}
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      run: |
        python ai_news_agent.py
    
    - name: Verify seen_items.json updated
      run: |
        if [ -f data/seen_items.json ]; then
          echo "✓ seen_items.json created/updated"
          echo "Total seen items now: $(jq '.seen_ids | length' data/seen_items.json)"
          git diff data/seen_items.json | head -20
        else
          echo "❌ ERROR: seen_items.json not created!"
          exit 1
        fi
    
    - name: Commit and push seen_items.json
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # Detect current branch
        BRANCH=$(git rev-parse --abbrev-ref HEAD)
        echo "Current branch: $BRANCH"
        
        # Check if seen_items.json exists
        if [ ! -f data/seen_items.json ]; then
          echo "❌ ERROR: data/seen_items.json not found!"
          ls -la data/
          exit 1
        fi
        
        echo "✓ seen_items.json exists"
        
        # Add seen_items.json
        git add data/seen_items.json
        
        # Check if there are changes to commit
        if git diff --cached --quiet; then
          echo "No changes to commit in seen_items.json"
          exit 0
        fi
        
        echo "Changes detected, committing..."
        git commit -m "Auto-update: seen_items.json $(date +'%Y-%m-%d %H:%M')"
        
        echo "Pulling latest changes..."
        git pull --rebase origin "$BRANCH" || {
          echo "⚠️  Pull failed, attempting to continue with push..."
        }
        
        echo "Pushing changes..."
        if git push origin "$BRANCH"; then
          echo "✓ Successfully pushed seen_items.json to $BRANCH"
        else
          echo "❌ ERROR: Failed to push changes"
          git status
          exit 1
        fi
    
    - name: Upload digest artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: daily-digest-${{ github.run_number }}
        path: |
          output/*.html
          output/*.txt
          logs/*.log
        retention-days: 30
